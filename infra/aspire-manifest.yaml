# Aspire Configuration for Azure Container Apps Deployment
# This file defines the services and their configuration for deployment

version: "1.0"

metadata:
  name: "pokemon-encyclopedia"
  description: "Pokemon Encyclopedia - Aspire Application"
  author: "Development Team"

services:
  # API Service
  pokemonencyclopedia-api:
    image: "pokemonencyclopedia.azurecr.io/pokemonencyclopedia-api:latest"
    containerPort: 8080
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:8080"
    resources:
      cpu: "0.5"
      memory: "1Gi"
    scaling:
      minReplicas: 1
      maxReplicas: 3
    healthCheck:
      path: "/health"
      interval: 10
      timeout: 5
    ingress:
      external: false
      targetPort: 8080
    bindings:
      redis:
        type: "redis"
        service: "pokemonencyclopedia-redis"

  # Web Service
  pokemonencyclopedia-web:
    image: "pokemonencyclopedia.azurecr.io/pokemonencyclopedia-web:latest"
    containerPort: 8080
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:8080"
      APISERVICE_ENDPOINT: "http://pokemonencyclopedia-api:8080"
    resources:
      cpu: "0.5"
      memory: "1Gi"
    scaling:
      minReplicas: 1
      maxReplicas: 3
    healthCheck:
      path: "/"
      interval: 10
      timeout: 5
    ingress:
      external: true
      targetPort: 8080

  # Redis Cache
  pokemonencyclopedia-redis:
    type: "azure-redis"
    properties:
      sku: "Standard"
      family: "C"
      capacity: 0
      enableNonSslPort: false
      minimumTlsVersion: "1.2"
