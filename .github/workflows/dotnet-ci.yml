name: .NET CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    name: Build, Test, and Coverage
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Run non-integration tests with code coverage
      run: |
        dotnet test \
          --no-build \
          --configuration Release \
          --filter "Category!=Integration" \
          --logger "trx;LogFileName=test-results.trx" \
          --collect:"XPlat Code Coverage" \
          --results-directory ./coverage/unit \
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

    - name: Run integration tests (no coverage)
      run: |
        dotnet test \
          --no-build \
          --configuration Release \
          --filter "Category=Integration&Category!=RequiresAppHost" \
          --logger "trx;LogFileName=integration-test-results.trx" \
          --results-directory ./coverage/integration

    - name: Copy coverage file to predictable location
      if: always()
      run: |
        mkdir -p ./coverage
        find ./coverage/unit -name 'coverage.cobertura.xml' -exec cp {} ./coverage/coverage.cobertura.xml \;

    - name: Code Coverage Summary
      if: always()
      uses: irongut/CodeCoverageSummary@v1.3.0
      with:
        filename: './coverage/coverage.cobertura.xml'
        badge: true
        fail_below_min: false
        format: markdown
        hide_branch_rate: false
        hide_complexity: true
        indicators: true
        output: file

    - name: Copy coverage summary to artifact folder
      if: always()
      run: |
        mkdir -p ./coverage-report
        cp ./code-coverage-results.md ./coverage-report/summary.md

    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        files: './coverage/unit/**/coverage.cobertura.xml'
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
        verbose: true

    - name: Publish test results
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: always() && github.actor != 'dependabot[bot]' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
      with:
        files: './coverage/**/*.trx'
        check_name: 'Unit Test Results'
        comment_mode: 'always'

    - name: Comment PR with coverage
      if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == github.repository
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const path = './coverage-report/summary.md';
          
          if (fs.existsSync(path)) {
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: fs.readFileSync(path, 'utf8')
            });
          }

    - name: Archive test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: ./coverage/**/*.trx
        if-no-files-found: ignore
        retention-days: 30

    - name: Archive coverage report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: ./coverage-report/
        if-no-files-found: ignore
        retention-days: 30

    - name: Check test results
      if: failure()
      run: |
        echo "❌ Tests failed!"
        exit 1

  code-quality:
    runs-on: ubuntu-latest
    name: Code Quality Checks
    needs: build-and-test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Install dotnet tools
      run: |
        dotnet tool install -g dotnet-format

    - name: Check code formatting
      run: |
        dotnet format --verify-no-changes --verbosity diagnostic || echo "Formatting issues detected"
      continue-on-error: true

    - name: Restore dependencies
      run: dotnet restore

    - name: Analyze with SonarAnalyzer
      run: dotnet build /p:EnableNETAnalyzers=true /p:EnforceCodeStyleInBuild=true --no-restore
      continue-on-error: true

  security-scan:
    runs-on: ubuntu-latest
    name: Security Scanning
    permissions:
      security-events: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
      continue-on-error: true

    - name: Upload Trivy results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v4
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  summary:
    runs-on: ubuntu-latest
    name: CI Summary
    needs: [build-and-test, code-quality, security-scan]
    if: always()
    
    steps:
    - name: Build summary
      run: |
        echo "## ✅ CI Pipeline Summary"
        echo ""
        echo "| Job | Status |"
        echo "|-----|--------|"
        echo "| Build & Test | ${{ needs.build-and-test.result }} |"
        echo "| Code Quality | ${{ needs.code-quality.result }} |"
        echo "| Security | ${{ needs.security-scan.result }} |"

    - name: Fail if critical jobs failed
      if: |
        needs.build-and-test.result == 'failure'
      run: |
        echo "❌ Build and test job failed!"
        exit 1
