name: Deploy to Azure (Terraform)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod
      build_images:
        description: 'Build container images before deploying'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  REGISTRY: ${{ secrets.AZURE_CONTAINER_REGISTRY_URL }}
  REGISTRY_USERNAME: ${{ secrets.AZURE_CONTAINER_REGISTRY_USERNAME }}
  REGISTRY_PASSWORD: ${{ secrets.AZURE_CONTAINER_REGISTRY_PASSWORD }}
  TF_VERSION: '1.5.7'

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    name: Build and Push Container Images
    runs-on: ubuntu-latest
    if: github.event.inputs.build_images == 'true'
    outputs:
      api_tag: ${{ steps.meta-api.outputs.tags }}
      web_tag: ${{ steps.meta-web.outputs.tags }}

    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Generate Docker metadata (API)
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/pokemonencyclopedia-api
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Generate Docker metadata (Web)
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/pokemonencyclopedia-web
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./PokemonEncyclopedia.ApiService
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/pokemonencyclopedia-api:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/pokemonencyclopedia-api:buildcache,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: ./PokemonEncyclopedia.Web
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/pokemonencyclopedia-web:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/pokemonencyclopedia-web:buildcache,mode=max

  deploy:
    name: Deploy with Terraform
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: always()
    environment:
      name: ${{ github.event.inputs.environment }}
      url: ${{ steps.terraform.outputs.web_service_url }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Format Check
        id: fmt
        run: |
          cd infra/terraform
          terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: |
          cd infra/terraform
          terraform init \
            -backend=false
        env:
          TF_IN_AUTOMATION: true

      - name: Terraform Validate
        id: validate
        run: |
          cd infra/terraform
          terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          cd infra/terraform
          terraform plan \
            -var-file=terraform.dev.tfvars \
            -var="environment=${{ github.event.inputs.environment }}" \
            -var="container_registry_url=${{ env.REGISTRY }}" \
            -var="container_registry_username=${{ env.REGISTRY_USERNAME }}" \
            -var="container_registry_password=${{ env.REGISTRY_PASSWORD }}" \
            -no-color \
            -out=tfplan
        env:
          TF_IN_AUTOMATION: true

      - name: Terraform Apply
        id: terraform
        run: |
          cd infra/terraform
          terraform apply -no-color tfplan
          WEB_URL=$(terraform output -raw web_service_url 2>/dev/null || echo "Pending")
          echo "web_service_url=$WEB_URL" >> $GITHUB_OUTPUT
          echo "deployment_success=true" >> $GITHUB_OUTPUT
        env:
          TF_IN_AUTOMATION: true
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        continue-on-error: true

      - name: Deployment Summary
        run: |
          echo "## Terraform Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ github.event.inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deployment Mode:** Terraform" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ steps.terraform.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.terraform.outputs.deployment_success }}" == "true" ]; then
            echo "**Web Service URL:** ${{ steps.terraform.outputs.web_service_url }}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "- Monitor deployment: \`terraform show\`" >> $GITHUB_STEP_SUMMARY
          echo "- View logs: \`terraform output\`" >> $GITHUB_STEP_SUMMARY

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Terraform Plan: ${{ steps.plan.outcome }}
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });
